name: Deploy to GitHub Pages

# Pubblica una nuova versione del sito ad ogni push su main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi richiesti dalla deploy su GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy concorrenti: l'ultimo push vince.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Il sito è statico (HTML/CSS + ES module nativo): nessun build necessario.
      # Assembliamo solo i file da pubblicare, escludendo sorgenti di sviluppo.
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r *.html css src assets _site/
          # .nojekyll evita che GitHub Pages ignori cartelle con underscore.
          touch _site/.nojekyll

      # enablement: true fa sì che l'action abiliti GitHub Pages (build via Actions)
      # se non è ancora attivo, evitando l'errore "Get Pages site failed / Not Found".
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
